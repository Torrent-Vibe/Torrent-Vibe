packages:
  - layer/*
  - packages/*
patchedDependencies:
  app-builder-lib@26.15.3: patches/app-builder-lib@26.15.3.patch
  linkedom: patches/linkedom.patch
nodeLinker: hoisted
autoInstallPeers: false
blockExoticSubdeps: false
minimumReleaseAge: 0
allowBuilds:
  "@tailwindcss/oxide": true
  bufferutil: false
  electron: true
  electron-window-corner-addon: true
  electron-winstaller: true
  esbuild: true
  fs-xattr: true
  macos-alias: true
  simple-git-hooks: true
  sqlite3: true
  unrs-resolver: true
  utf-8-validate: false
